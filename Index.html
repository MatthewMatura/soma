<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Soma — Anatomy Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#241826; --ink-soft:#5a4a60;
  --bone:#f4ede1; --bone-2:#ece1cf; --card:#fbf6ec;
  --line:#dccdb7;
  --arterial:#b83227; --arterial-2:#e05a4d;
  --venous:#2f6b78;
  --gold:#c6902f; --gold-2:#e6b74e;
  --good:#3a8a57; --good-bg:#e7f4ec;
  --bad:#c23a2e; --bad-bg:#fbeae8;
  --shadow:0 1px 2px rgba(36,24,38,.06),0 10px 26px rgba(36,24,38,.09);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Hanken Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bone);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:"Fraunces",Georgia,serif}
.mono{font-family:"Spline Sans Mono",ui-monospace,monospace}
h1,h2,h3{font-family:"Fraunces",Georgia,serif;margin:0;line-height:1.12}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:30;background:rgba(244,237,225,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 16px 0}
.topbar-in{display:flex;align-items:center;gap:14px;height:56px;max-width:640px;margin:0 auto}
.brand{display:flex;align-items:baseline;gap:8px;margin-right:auto}
.brand .logo{font-family:"Fraunces",serif;font-weight:600;font-size:25px;letter-spacing:.5px;position:relative}
.brand .logo::after{content:"";position:absolute;left:0;right:0;bottom:2px;height:6px;background:var(--arterial);opacity:.16;border-radius:3px}
.brand .greek{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);opacity:.7}
.hstat{display:flex;align-items:center;gap:5px;font-weight:800;font-size:15px}
.hstat .g{font-size:16px}
.hstat.streak{color:var(--arterial)}
.hstat.xp{color:var(--gold)}
.hstat.crown{color:var(--venous)}
.gear{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;color:var(--ink-soft)}
.gear:hover{background:var(--bone-2)}

main{max-width:640px;margin:0 auto;padding:22px 18px 60px}

/* ---------- path ---------- */
.introcard{background:linear-gradient(135deg,#fbf6ec,#f1e4d1);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:26px}
.introcard .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--arterial);font-weight:800}
.introcard h1{font-size:26px;margin:6px 0 6px}
.introcard p{margin:0;color:var(--ink-soft);font-size:14.5px}

.unit{margin-bottom:34px}
.unit-head{display:flex;align-items:center;gap:12px;background:var(--ink);color:var(--bone);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);position:sticky;top:64px;z-index:10}
.unit-head .ug{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:20px}
.unit-head .ut{font-family:"Fraunces",serif;font-weight:600;font-size:17px;flex:1}
.unit-head .up{font-size:12px;font-weight:700;opacity:.8;font-family:"Spline Sans Mono",monospace}

.track{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:18px;position:relative}
.node-wrap{position:relative;display:flex;justify-content:center;width:100%}
.node{position:relative;width:76px;height:70px;border-radius:50%;display:grid;place-items:center;font-size:26px;color:#fff;font-weight:800;transition:transform .12s;box-shadow:0 4px 0 rgba(0,0,0,.18)}
.node:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
.node.done{background:var(--gold)}
.node.current{background:var(--arterial)}
.node.todo{background:var(--bone-2);color:var(--ink-soft);box-shadow:0 4px 0 var(--line)}
.node .crown{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:15px;color:var(--gold-2);filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
.node.current::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:3px solid var(--arterial);opacity:.35;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.25);opacity:0}}
.node-lbl{font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:2px;margin-bottom:8px}
.connector{width:4px;height:20px;background:var(--line);border-radius:3px}
.off-l{transform:translateX(-58px)} .off-r{transform:translateX(58px)}
.review-node{margin-top:8px}

/* ---------- lesson / end screens ---------- */
.screen{display:none;position:fixed;inset:0;z-index:50;background:var(--bone);flex-direction:column}
.screen.show{display:flex}
.lesson-top{display:flex;align-items:center;gap:14px;padding:calc(12px + env(safe-area-inset-top)) 18px 12px;max-width:640px;margin:0 auto;width:100%}
.quit{font-size:26px;color:var(--ink-soft);line-height:1;width:30px}
.lbar{flex:1;height:14px;background:var(--bone-2);border-radius:8px;overflow:hidden}
.lbar > i{display:block;height:100%;background:var(--arterial);border-radius:8px;transition:width .35s}
.hearts{display:flex;gap:3px;font-size:17px;color:var(--arterial)}
.hearts .h{transition:transform .2s,opacity .2s}
.hearts .h.lost{opacity:.22;transform:scale(.82)}
.lesson-body{flex:1;overflow-y:auto;max-width:640px;margin:0 auto;width:100%;padding:8px 18px 20px}
.qtag{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--venous);font-weight:500}
.qtext{font-family:"Fraunces",serif;font-size:25px;font-weight:600;line-height:1.2;margin:10px 0 24px}
.opts{display:grid;gap:12px}
.opt{display:flex;align-items:center;gap:14px;padding:16px 18px;border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;background:var(--card);font-size:16.5px;font-weight:600;text-align:left;width:100%;transition:.1s}
.opt .k{width:28px;height:28px;border-radius:8px;background:var(--bone-2);display:grid;place-items:center;font-weight:800;font-size:14px;flex:0 0 auto}
.opt.sel{border-color:var(--venous);background:#eaf2f4}
.opt.sel .k{background:var(--venous);color:#fff}
.opt.correct{border-color:var(--good);background:var(--good-bg)}
.opt.correct .k{background:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .k{background:var(--bad);color:#fff}
.opt:disabled{cursor:default}

.footer{border-top:2px solid var(--line);background:var(--card);transition:background .2s,border-color .2s}
.footer.correct{background:var(--good-bg);border-color:var(--good)}
.footer.wrong{background:var(--bad-bg);border-color:var(--bad)}
.footer-in{max-width:640px;margin:0 auto;padding:16px 18px calc(18px + env(safe-area-inset-bottom))}
.feedback{display:none;margin-bottom:14px}
.feedback.show{display:block;animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback .fh{display:flex;align-items:center;gap:9px;font-family:"Fraunces",serif;font-size:19px;font-weight:600;margin-bottom:4px}
.feedback.correct .fh{color:var(--good)}
.feedback.wrong .fh{color:var(--bad)}
.feedback .fe{font-size:14.5px;color:var(--ink)}
.feedback .fe b{color:var(--arterial)}
.cta{width:100%;padding:16px;border-radius:15px;font-weight:800;font-size:17px;letter-spacing:.02em;text-transform:uppercase;box-shadow:0 4px 0 rgba(0,0,0,.15);transition:transform .1s,box-shadow .1s}
.cta:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15)}
.cta.check{background:var(--ink);color:var(--bone)}
.cta.check:disabled{background:var(--bone-2);color:var(--ink-soft);box-shadow:0 4px 0 var(--line);cursor:default}
.cta.go-correct{background:var(--good);color:#fff;box-shadow:0 4px 0 #2c6a42}
.cta.go-wrong{background:var(--bad);color:#fff;box-shadow:0 4px 0 #97281f}

.end{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;max-width:640px;margin:0 auto;width:100%}
.end .emblem{font-size:66px;margin-bottom:8px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.end h2{font-size:32px;margin-bottom:8px}
.end p{color:var(--ink-soft);margin:0 0 26px}
.tallies{display:flex;gap:12px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.tally{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;padding:6px;width:104px}
.tally .cap{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;padding:6px;border-radius:11px 11px 0 0;color:#fff}
.tally.xp .cap{background:var(--gold)}
.tally.acc .cap{background:var(--venous)}
.tally.heart .cap{background:var(--arterial)}
.tally .val{font-family:"Fraunces",serif;font-size:27px;font-weight:600;padding:8px 0 6px}
.end .cta{max-width:320px}

/* ---------- settings ---------- */
.scrim{position:fixed;inset:0;background:rgba(36,24,38,.42);z-index:70;display:none}
.scrim.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:71;background:var(--bone);border-radius:22px 22px 0 0;padding:24px 22px calc(30px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;transform:translateY(100%);transition:transform .3s;box-shadow:0 -8px 40px rgba(36,24,38,.2)}
.sheet.show{transform:none}
.sheet h2{font-size:22px;margin-bottom:4px}
.sheet .sub{color:var(--ink-soft);font-size:14px;margin-bottom:16px}
.pill-stat{display:flex;gap:10px;flex-wrap:wrap}
.pill-stat .p{flex:1;min-width:80px;background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:12px 8px;text-align:center}
.pill-stat .p .v{font-family:"Fraunces",serif;font-size:26px;font-weight:600}
.pill-stat .p .l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:700}
.rowbtns{display:flex;gap:10px;margin-top:22px}
.btn{padding:13px 18px;border-radius:13px;font-weight:700;font-size:15px}
.btn-primary{background:var(--arterial);color:#fff;box-shadow:0 4px 0 #8f2018}
.btn-ghost{background:var(--card);color:var(--ink);border:2px solid var(--line)}
.danger{color:var(--bad);font-weight:700;font-size:13px;margin-top:18px;display:block}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand"><span class="logo">Soma</span><span class="greek">σῶμα</span></div>
    <div class="hstat streak"><span class="g">🔥</span><span id="hStreak">0</span></div>
    <div class="hstat crown"><span class="g">♔</span><span id="hCrown">0</span></div>
    <div class="hstat xp"><span class="g">◆</span><span id="hXp">0</span></div>
    <button class="gear" onclick="openSheet()" aria-label="Settings">⚙︎</button>
  </div>
</div>

<main id="path">
  <div class="introcard">
    <div class="eyebrow">Anatomy Trainer</div>
    <h1>Learn the body, one rep at a time.</h1>
    <p>Short lessons. Instant feedback. Miss a question and it comes back around until it sticks.</p>
  </div>
  <div id="units"></div>
</main>

<!-- lesson screen -->
<div class="screen" id="lessonScreen">
  <div class="lesson-top">
    <button class="quit" onclick="quitLesson()" aria-label="Quit">✕</button>
    <div class="lbar"><i id="lProg"></i></div>
    <div class="hearts" id="hearts"></div>
  </div>
  <div class="lesson-body" id="lessonBody"></div>
  <div class="footer" id="footer">
    <div class="footer-in">
      <div class="feedback" id="feedback">
        <div class="fh" id="fbHead"></div>
        <div class="fe" id="fbExp"></div>
      </div>
      <button class="cta check" id="cta" disabled>Check</button>
    </div>
  </div>
</div>

<!-- end screen -->
<div class="screen" id="endScreen"><div class="end" id="endBody"></div></div>

<!-- settings -->
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <h2>Your progress</h2>
  <div class="sub">Saved on this device only.</div>
  <div class="pill-stat">
    <div class="p"><div class="v" id="sStreak">0</div><div class="l">Streak</div></div>
    <div class="p"><div class="v" id="sXp">0</div><div class="l">XP</div></div>
    <div class="p"><div class="v" id="sCrown">0</div><div class="l">Crowns</div></div>
    <div class="p"><div class="v" id="sMissed">0</div><div class="l">To review</div></div>
  </div>
  <div class="rowbtns"><button class="btn btn-primary" onclick="closeSheet()" style="flex:1">Done</button></div>
  <button class="danger" onclick="resetAll()">Reset all progress</button>
  <p style="font-size:11px;color:var(--ink-soft);opacity:.7;margin-top:14px">Soma is a study aid, not medical advice. v2 · quiz</p>
</div>

<script>
/* ============================================================
   DATA — question bank
   ============================================================ */
const QUESTIONS = [
  {sys:"terms",tag:"Terminology",q:"Which plane divides the body into left and right halves?",opts:["Frontal","Sagittal","Transverse","Oblique"],a:1,e:"The <b>sagittal</b> plane runs vertically front-to-back. Down the exact middle it's the midsagittal plane."},
  {sys:"terms",tag:"Terminology",q:"The elbow is ____ to the wrist.",opts:["Distal","Superficial","Proximal","Medial"],a:2,e:"<b>Proximal</b> means nearer the limb's attachment to the trunk — the elbow is closer than the wrist."},
  {sys:"terms",tag:"Terminology",q:"Another name for the frontal plane is the:",opts:["Axial plane","Median plane","Coronal plane","Transverse plane"],a:2,e:"Frontal = <b>coronal</b>: a vertical plane splitting anterior from posterior."},
  {sys:"terms",tag:"Terminology",q:"'Anterior' is synonymous with:",opts:["Dorsal","Ventral","Caudal","Cranial"],a:1,e:"<b>Ventral</b> = anterior = toward the front. Dorsal = posterior."},
  {sys:"terms",tag:"Terminology",q:"Twisting your torso to look behind you occurs mainly in which plane?",opts:["Sagittal","Frontal","Transverse","Coronal"],a:2,e:"Rotation happens in the <b>transverse</b> plane — around a vertical axis."},

  {sys:"movement",tag:"Movement",q:"Straightening the knee is an example of:",opts:["Flexion","Extension","Abduction","Rotation"],a:1,e:"Increasing a joint angle is <b>extension</b>. Bending it back is flexion."},
  {sys:"movement",tag:"Movement",q:"Which joint type allows movement in every direction?",opts:["Hinge","Pivot","Ball-and-socket","Saddle"],a:2,e:"The <b>ball-and-socket</b> joint (shoulder, hip) is the most mobile — and the shoulder is the most dislocated."},
  {sys:"movement",tag:"Movement",q:"Turning the palm to face upward is called:",opts:["Pronation","Supination","Eversion","Adduction"],a:1,e:"<b>Supination</b> = palm up (think holding soup). Pronation = palm down."},
  {sys:"movement",tag:"Movement",q:"Pointing your toes down (like a ballet dancer) is:",opts:["Dorsiflexion","Plantarflexion","Inversion","Eversion"],a:1,e:"<b>Plantarflexion</b> points the foot down; dorsiflexion pulls it up toward the shin."},
  {sys:"movement",tag:"Movement",q:"In a biceps curl, the triceps acts as the:",opts:["Agonist","Antagonist","Synergist","Fixator"],a:1,e:"The opposing muscle is the <b>antagonist</b>. The biceps (prime mover) is the agonist here."},
  {sys:"movement",tag:"Movement",q:"A muscle's attachment on the more movable bone is its:",opts:["Origin","Insertion","Belly","Tendon sheath"],a:1,e:"The <b>insertion</b> is on the moving bone and travels toward the origin when the muscle shortens."},

  {sys:"muscle",tag:"Muscles",q:"Which muscle is the prime mover for hip extension?",opts:["Rectus femoris","Gluteus maximus","Sartorius","Iliopsoas"],a:1,e:"The <b>gluteus maximus</b> is the body's most powerful extensor."},
  {sys:"muscle",tag:"Muscles",q:"The hamstrings perform which two actions?",opts:["Knee extension & hip flexion","Knee flexion & hip extension","Knee flexion & hip flexion","Knee extension & hip extension"],a:1,e:"Hamstrings <b>flex the knee</b> and <b>extend the hip</b> — opposite to the quads."},
  {sys:"muscle",tag:"Muscles",q:"Which muscle is chiefly responsible for shoulder abduction?",opts:["Pectoralis major","Latissimus dorsi","Deltoid","Trapezius"],a:2,e:"The <b>deltoid</b> lifts the arm out to the side."},
  {sys:"muscle",tag:"Muscles",q:"The biceps brachii flexes the elbow and also:",opts:["Pronates the forearm","Supinates the forearm","Extends the wrist","Abducts the shoulder"],a:1,e:"It flexes the elbow and <b>supinates</b> the forearm — like turning a screwdriver clockwise (right hand)."},
  {sys:"muscle",tag:"Physiology",q:"In the sliding filament theory, myosin heads pull on:",opts:["Titin","Actin","Tropomyosin","Collagen"],a:1,e:"Myosin (thick filament) pulls the thin <b>actin</b> filaments inward to shorten the sarcomere."},
  {sys:"muscle",tag:"Physiology",q:"Lowering a dumbbell slowly is which type of contraction?",opts:["Concentric","Isometric","Eccentric","Isotonic-only"],a:2,e:"Lengthening under load is <b>eccentric</b> — where most strength and soreness are built."},
  {sys:"muscle",tag:"Physiology",q:"The smallest functional unit of movement control is a:",opts:["Sarcomere","Motor unit","Myofibril","Fascicle"],a:1,e:"A <b>motor unit</b> = one motor neuron + all the fibers it controls."},
  {sys:"muscle",tag:"Physiology",q:"A plank hold is primarily what kind of contraction?",opts:["Concentric","Eccentric","Isometric","Isokinetic"],a:2,e:"No change in muscle length under load = <b>isometric</b>."},

  {sys:"skeletal",tag:"Skeleton",q:"How many cervical vertebrae are there?",opts:["5","7","12","4"],a:1,e:"<b>7</b> cervical vertebrae — 'breakfast at 7'. Then 12 thoracic, 5 lumbar."},
  {sys:"skeletal",tag:"Skeleton",q:"Which of these belongs to the axial skeleton?",opts:["Femur","Rib cage","Scapula","Radius"],a:1,e:"The <b>rib cage</b> is axial (skull, spine, ribs). The others are appendicular."},
  {sys:"skeletal",tag:"Skeleton",q:"The longest and strongest bone in the body is the:",opts:["Tibia","Humerus","Femur","Sternum"],a:2,e:"The <b>femur</b> — the thigh bone."},
  {sys:"skeletal",tag:"Skeleton",q:"On the thumb side of the forearm is the:",opts:["Ulna","Radius","Fibula","Tibia"],a:1,e:"The <b>radius</b> is lateral (thumb side); the ulna is medial (pinky side)."},
  {sys:"skeletal",tag:"Skeleton",q:"The kneecap (patella) sits within the tendon of which muscle?",opts:["Hamstrings","Gastrocnemius","Quadriceps","Sartorius"],a:2,e:"The patella is embedded in the <b>quadriceps</b> tendon, improving its leverage."}
];

const UNITS = [
  {id:"terms",   name:"Orientation & Terms", glyph:"✛"},
  {id:"movement",name:"Joints & Movement",   glyph:"⟳"},
  {id:"muscle",  name:"Muscular System",     glyph:"⚟"},
  {id:"skeletal",name:"Skeletal System",     glyph:"☠"}
];

function chunkLessons(items,target=4){
  const n=Math.max(1,Math.round(items.length/target));
  const size=Math.ceil(items.length/n);
  const out=[]; for(let i=0;i<items.length;i+=size) out.push(items.slice(i,i+size));
  return out;
}
const LESSONS=[];
UNITS.forEach(u=>{
  const pool=QUESTIONS.map((q,i)=>({q,i})).filter(o=>o.q.sys===u.id);
  chunkLessons(pool).forEach((chunk,li)=>{ LESSONS.push({id:`${u.id}-${li+1}`,unit:u.id,n:li+1,items:chunk}); });
});

/* ============================================================
   state
   ============================================================ */
const LS="soma:v2";
let S=load();
function load(){ try{const r=JSON.parse(localStorage.getItem(LS));if(r)return r;}catch(e){} return {xp:0,streak:0,lastDay:null,done:{},missed:[]}; }
function save(){ try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){} }
function today(){ return new Date().toISOString().slice(0,10); }
function bumpStreak(){
  const t=today(); if(S.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?S.streak+1:1; S.lastDay=t; save();
}
function paintTop(){
  const crowns=Object.keys(S.done).length;
  hStreak.textContent=S.streak; hXp.textContent=S.xp; hCrown.textContent=crowns;
  sStreak.textContent=S.streak; sXp.textContent=S.xp; sCrown.textContent=crowns; sMissed.textContent=S.missed.length;
}

/* ============================================================
   path
   ============================================================ */
function nextLessonId(){ const u=LESSONS.find(l=>!S.done[l.id]); return u?u.id:null; }
function renderPath(){
  const cur=nextLessonId();
  const box=document.getElementById("units");
  box.innerHTML="";
  UNITS.forEach(u=>{
    const ls=LESSONS.filter(l=>l.unit===u.id);
    const doneCt=ls.filter(l=>S.done[l.id]).length;
    const unit=document.createElement("div"); unit.className="unit";
    unit.innerHTML=`<div class="unit-head"><div class="ug">${u.glyph}</div><div class="ut">${u.name}</div><div class="up">${doneCt}/${ls.length}</div></div>`;
    const track=document.createElement("div"); track.className="track";
    ls.forEach((l,i)=>{
      const done=S.done[l.id], isCur=l.id===cur;
      const off=["","off-r","off-l","off-r","off-l"][i%5];
      const wrap=document.createElement("div"); wrap.className="node-wrap";
      const btn=document.createElement("button");
      btn.className="node "+(done?"done":isCur?"current":"todo")+" "+off;
      btn.innerHTML=`${done?'<span class="crown">♔</span>':""}${done?"✓":isCur?"★":l.n}`;
      btn.onclick=()=>startLesson(l.id);
      wrap.appendChild(btn); track.appendChild(wrap);
      const lbl=document.createElement("div"); lbl.className="node-lbl "+off; lbl.textContent=`Lesson ${l.n}`; track.appendChild(lbl);
      if(i<ls.length-1){const c=document.createElement("div");c.className="connector";track.appendChild(c);}
    });
    unit.appendChild(track); box.appendChild(unit);
  });
  if(S.missed.length){
    const rn=document.createElement("div"); rn.className="review-node track";
    rn.innerHTML=`<div class="node-wrap"><button class="node" style="background:var(--venous)">⟲</button></div><div class="node-lbl">Review · ${S.missed.length} to nail</div>`;
    rn.querySelector(".node").onclick=()=>startLesson("review");
    box.appendChild(rn);
  }
  paintTop();
}

/* ============================================================
   lesson engine
   ============================================================ */
let queue=[],pos=0,hearts=5,correctCt=0,xpEarned=0,phase="answer",picked=-1,curLesson=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startLesson(id){
  curLesson=id;
  if(id==="review") queue=shuffle(QUESTIONS.map((q,i)=>({q,i})).filter(o=>S.missed.includes(o.i)));
  else { const l=LESSONS.find(x=>x.id===id); queue=shuffle(l.items); }
  if(!queue.length) return;
  pos=0;hearts=5;correctCt=0;xpEarned=0;
  document.getElementById("path").style.display="none";
  endScreen.classList.remove("show");
  lessonScreen.classList.add("show");
  renderQuestion();
}
function heartsEl(){return document.getElementById("hearts");}
function renderHearts(){
  heartsEl().innerHTML="";
  for(let i=0;i<5;i++){const s=document.createElement("span");s.className="h"+(i>=hearts?" lost":"");s.textContent="♥";heartsEl().appendChild(s);}
}
function renderQuestion(){
  phase="answer";picked=-1;
  const {q}=queue[pos];
  lProg.style.width=`${pos/queue.length*100}%`;
  renderHearts();
  const body=document.getElementById("lessonBody"); body.scrollTop=0;
  const order=shuffle(q.opts.map((t,i)=>({t,i})));
  body.innerHTML=`<div class="qtag">${q.tag}</div><div class="qtext">${q.q}</div><div class="opts" id="opts"></div>`;
  const K=["A","B","C","D"];
  order.forEach((o,vi)=>{
    const b=document.createElement("button"); b.className="opt"; b.dataset.orig=o.i;
    b.innerHTML=`<span class="k">${K[vi]}</span><span>${o.t}</span>`;
    b.onclick=()=>pick(b,o.i);
    document.getElementById("opts").appendChild(b);
  });
  const f=document.getElementById("footer"); f.className="footer";
  document.getElementById("feedback").className="feedback";
  const cta=document.getElementById("cta");
  cta.className="cta check";cta.textContent="Check";cta.disabled=true;cta.onclick=check;
}
function pick(btn,orig){
  if(phase!=="answer")return;
  picked=orig;
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  btn.classList.add("sel");
  document.getElementById("cta").disabled=false;
}
function check(){
  if(picked<0)return;
  phase="feedback";
  const {q,i}=queue[pos];
  const right=picked===q.a;
  document.querySelectorAll(".opt").forEach(o=>{
    o.disabled=true; const orig=+o.dataset.orig;
    if(orig===q.a)o.classList.add("correct");
    if(orig===picked&&!right)o.classList.add("wrong");
  });
  const f=document.getElementById("footer"), fb=document.getElementById("feedback");
  if(right){
    correctCt++;xpEarned+=10;S.xp+=10;
    S.missed=S.missed.filter(m=>m!==i);
    f.classList.add("correct");fb.className="feedback correct show";
    document.getElementById("fbHead").innerHTML="✓ Nice.";
  }else{
    hearts--;renderHearts();
    if(!S.missed.includes(i))S.missed.push(i);
    f.classList.add("wrong");fb.className="feedback wrong show";
    document.getElementById("fbHead").innerHTML="✕ Not quite.";
  }
  document.getElementById("fbExp").innerHTML=q.e;
  save();
  const cta=document.getElementById("cta");
  cta.className="cta "+(right?"go-correct":"go-wrong");
  cta.disabled=false;cta.textContent="Continue";
  cta.onclick=()=>{ if(hearts<=0) return failLesson(); advance(); };
}
function advance(){ pos++; if(pos>=queue.length) return completeLesson(); renderQuestion(); }
function completeLesson(){
  lProg.style.width="100%";
  const acc=Math.round(correctCt/queue.length*100);
  if(curLesson!=="review" && !S.done[curLesson]){ S.done[curLesson]=true; xpEarned+=5; S.xp+=5; }
  bumpStreak();save();paintTop();
  const perfect=acc===100;
  showEnd(`
    <div class="emblem">${perfect?"🏆":"✦"}</div>
    <h2>${curLesson==="review"?"Review done":"Lesson complete"}</h2>
    <p>${perfect?"Flawless — every one correct.":acc>=60?"Solid work. Misses are saved to review.":"Good rep. The tough ones will come back around."}</p>
    <div class="tallies">
      <div class="tally xp"><div class="cap">Total XP</div><div class="val">+${xpEarned}</div></div>
      <div class="tally acc"><div class="cap">Accuracy</div><div class="val">${acc}%</div></div>
      <div class="tally heart"><div class="cap">Hearts</div><div class="val">${hearts}</div></div>
    </div>
    <button class="cta go-correct" onclick="backToPath()">Continue</button>
  `);
}
function failLesson(){
  save();paintTop();
  showEnd(`
    <div class="emblem">💔</div>
    <h2>Out of hearts</h2>
    <p>You got ${correctCt} right before running out. The misses are in your review bank — give it another go.</p>
    <div class="tallies">
      <div class="tally xp"><div class="cap">XP earned</div><div class="val">+${xpEarned}</div></div>
      <div class="tally acc"><div class="cap">Got right</div><div class="val">${correctCt}</div></div>
    </div>
    <button class="cta" style="background:var(--arterial);color:#fff;box-shadow:0 4px 0 #8f2018" onclick="startLesson('${curLesson}')">Try again</button>
    <button class="btn btn-ghost" style="margin-top:12px;max-width:320px;width:100%" onclick="backToPath()">Back to path</button>
  `);
}
function showEnd(html){
  lessonScreen.classList.remove("show");
  document.getElementById("endBody").innerHTML=html;
  endScreen.classList.add("show");
}
function backToPath(){
  endScreen.classList.remove("show");
  document.getElementById("path").style.display="";
  renderPath(); window.scrollTo({top:0});
}
function quitLesson(){
  if(pos>0 && !confirm("Quit this lesson? Your XP so far is kept, but the lesson won't be marked complete.")) return;
  lessonScreen.classList.remove("show");
  document.getElementById("path").style.display="";
  renderPath();
}

/* ============================================================
   settings
   ============================================================ */
function openSheet(){paintTop();scrim.classList.add("show");sheet.classList.add("show");}
function closeSheet(){scrim.classList.remove("show");sheet.classList.remove("show");}
function resetAll(){
  if(!confirm("Reset all progress, streak and review bank? Can't be undone."))return;
  localStorage.removeItem(LS);S=load();save();closeSheet();renderPath();
}

renderPath();
</script>
</body>
